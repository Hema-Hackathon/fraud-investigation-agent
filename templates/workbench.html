<!DOCTYPE html>

<html>

<head>

<title>Investigator Workbench</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

<style>

body{
    background:#020c2c;
    color:white;
}

.card{
    background:#1e293b;
    border:1px solid #334155;
    border-radius:12px;
    color:white;
}

.section-title{
    color:#93c5fd;
    font-size:18px;
    font-weight:600;
    margin-bottom:15px;
}

.result-box{
    background:#0b1220;
    border:1px solid #334155;
    border-radius:10px;
    padding:15px;
    white-space:pre-wrap;
}

</style>

</head>

<body>

<div class="container-fluid p-4">

<div class="d-flex justify-content-between">

<h2>
Financial Crime Investigator Workbench
</h2>

<a href="../"
class="btn btn-secondary">

Back

</a>

</div>

<div class="row mt-4">

<div class="col-md-4">

<div class="card p-3">

<div class="section-title">
Investigation Request
</div>

<p>{{ query }}</p>

</div>

<div class="card p-3 mt-3">

<div class="section-title">
AI Investigator
</div>

<p>
Financial crime investigation completed.
Review findings and risk indicators.
</p>

</div>

</div>

<div class="col-md-8">

<div class="card p-3">

<div class="section-title">
Investigation Results
</div>

<div class="result-box">
{{ result }}
</div>

</div>

</div>

</div>

</div>

</body>

</html>
