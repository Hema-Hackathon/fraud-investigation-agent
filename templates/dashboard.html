<!DOCTYPE html>

<html>

<head>

<title>
Financial Crime Intelligence Platform
</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">
<style>
    
body{
    background:#020c2c;
    color:white;
    font-family:Arial, sans-serif;
}

.sidebar{
    background:#071633;
    min-height:100vh;
    padding:20px;
    border-right:1px solid #1e293b;
}

.sidebar p{
    color:#cbd5e1;
    cursor:pointer;
}

.sidebar p:hover{
    color:white;
}

.card{
    background:#1e293b !important;
    border:1px solid #334155;
    border-radius:12px;
    color:white !important;
}

.card h6{
    color:#94a3b8;
    font-size:14px;
}

.kpi{
    font-size:48px;
    font-weight:700;
    color:#60a5fa;
}

h2{
    font-weight:700;
    margin-bottom:20px;
}

.form-control{
    background:#0f172a;
    border:1px solid #334155;
    color:white;
}

.form-control:focus{
    background:#0f172a;
    color:white;
    border-color:#60a5fa;
    box-shadow:none;
}


body{
    background:#0f172a;
    color:white;
}

.card{
    background:#1e293b;
    border:none;
}

.sidebar{
    background:#111827;
    min-height:100vh;
    padding:20px;
}

.kpi{
    font-size:32px;
    font-weight:bold;
}

.form-control{
    background:#0b1220 !important;
    color:white !important;
    border:1px solid #334155;
}

.form-control::placeholder{
    color:#94a3b8;
}

.form-control:focus{
    background:#0b1220 !important;
    color:white !important;
    border-color:#60a5fa;
    box-shadow:none;
}
</style>


</head>

<body>

<div class="container-fluid">

<div class="row">

<div class="col-md-2 sidebar">

<h4>
Investigator
</h4>

<hr>

<p>Dashboard</p>
<p>Customers</p>
<p>Crypto</p>
<p>Cases</p>

</div>

<div class="col-md-10 p-4">

<h2>
Financial Crime Intelligence Platform
</h2>

<div class="row mt-4">

<div class="col-md-4">
<div class="card p-3">
<h6>Suspicious Customers</h6>
<div class="kpi">
    {{ suspicious_count }}
</div>
</div>
</div>

<div class="col-md-4">
<div class="card p-3">
<h6>Crypto Transactions</h6>
<div class="kpi">
{{ crypto_count }}
</div>
</div>
</div>

<div class="col-md-4">
<div class="card p-3">
<h6>High Value Transfers</h6>
<div class="kpi">
{{ high_value_count }}
</div>
</div>
</div>

</div>

<div class="card mt-4 p-4">

<h4>
Investigate Customer
</h4>

<form action="investigate"
      method="post">

<input
    type="text"
    class="form-control"
    name="query"
    value="investigate customer C0057"
    required>

<button
class="btn btn-danger mt-3"
type="submit">

Investigate

</button>

</form>

</div>

</div>

</div>

</div>

</body>

</html>
